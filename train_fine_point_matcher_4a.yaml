data:
  input_root: /fangzhouc/point-data-homologous
  processed_root: /fangzhouc/alignmodel702/outputs/processed_shot_full_v4_crop125
  split_seed: 0

model:
  shot_dim: 352
  feature_dim: 64
  num_heads: 4
  kernel_points: 15
  ops_topk: 6
  mutual_topk: 3
  max_points_per_patch: null
  max_dense_points_per_patch: 3000
  use_compatibility_graph: false
  compatibility_distance_tolerance_angstrom: 12.0
  compatibility_max_nodes: 512
  compatibility_min_clique_size: 3
  use_multiscale_pose_refinement: true
  use_fusion_mlp: false
  coarse_output_topk: 3
  fine_ops_topk: 6
  fine_output_topk: 6
  fine_crop_diameter_factor: 1.25
  fine_point_cap_factor: 1.25
  fine_max_points_per_patch: 3000
  fine_min_valid_points: 3
  fine_min_half_points: 8
  pair_scoring_mode: legacy
  use_fine_point_matcher: true
  fine_point_feature_dim: 64
  fine_point_attention_heads: 4
  fine_point_attention_query_chunk: 512
  fine_point_pair_radius_angstrom: 3.0
  max_fine_point_pair_elements: 4000000
  fine_point_descriptor_temperature: 0.1
  use_equivariant_hypothesis_pose: true
  use_learned_equivariant_features: true
  equivariant_feature_dim: 8
  equivariant_max_hypotheses: 32
  equivariant_acceptance_radius_angstrom: 3.0

training:
  epochs: 1
  checkpoint_interval_structures: 100
  max_coarse_workload_elements: 4000000
  log_interval_structures: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 15
  grad_clip_norm: 1.0
  mixed_precision: true
  seed: 43
  device: cuda

output:
  run_dir: outputs/train_fine_point_matcher_4a_v1
